<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>vibe — Cesium</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css"
    />
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.js"></script>

    <style>
      html,
      body,
      #cesiumContainer {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }

      body {
        position: relative;
      }

      :root {
        --hud-green: #00ff00;
        --hud-bg: rgba(0, 0, 0, 0.35);
      }

      /* HUD overlay */
      #hud {
        position: absolute;
        inset: 0;
        z-index: 9999;
        pointer-events: none;
        font-family: "Share Tech Mono", "Courier New", monospace;
        color: var(--hud-green);
        text-shadow: 0 0 6px rgba(0, 255, 0, 0.65);
      }

      .hud-panel {
        position: absolute;
        width: 320px;
        padding: 10px 12px;
        background: var(--hud-bg);
        border: 1px solid rgba(0, 255, 0, 0.85);
        box-sizing: border-box;
        pointer-events: auto;
      }

      .hud-title {
        font-size: 14px;
        letter-spacing: 0.08em;
        margin: 0 0 8px 0;
      }

      .hud-row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        font-size: 13px;
        line-height: 1.35;
      }

      .hud-muted {
        opacity: 0.85;
      }

      /* Crosshair-style corner accents */
      .hud-panel::before,
      .hud-panel::after {
        content: "";
        position: absolute;
        width: 18px;
        height: 18px;
        border-color: rgba(0, 255, 0, 0.95);
        pointer-events: none;
      }

      .hud-panel::before {
        left: -1px;
        top: -1px;
        border-left: 1px solid;
        border-top: 1px solid;
      }

      .hud-panel::after {
        right: -1px;
        bottom: -1px;
        border-right: 1px solid;
        border-bottom: 1px solid;
      }

      /* Panel placement */
      #panelStatus {
        left: 14px;
        top: 14px;
      }

      #panelTargeting {
        right: 14px;
        top: 14px;
      }

      #panelInspect {
        right: 14px;
        top: 170px;
        width: 360px;
        display: none;
      }

      #inspectBody {
        font-size: 13px;
        line-height: 1.35;
        white-space: pre-wrap;
      }

      #panelSensors {
        left: 14px;
        bottom: 14px;
        width: 360px;
      }

      .hud-btns {
        display: flex;
        gap: 10px;
        margin-top: 10px;
      }

      .hud-btn {
        font-family: inherit;
        font-size: 13px;
        letter-spacing: 0.06em;
        padding: 8px 10px;
        border: 1px solid rgba(0, 255, 0, 0.85);
        background: rgba(0, 0, 0, 0.25);
        color: var(--hud-green);
        text-shadow: inherit;
      }

      .hud-btn[disabled] {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .hud-btn.active {
        background: rgba(0, 255, 0, 1);
        border-color: rgba(0, 255, 0, 1);
        color: #000;
        text-shadow: none;
      }
    </style>
  </head>
  <body>
    <div id="cesiumContainer"></div>

    <div id="hud" aria-hidden="true">
      <div id="panelStatus" class="hud-panel">
        <div class="hud-title">SYSTEM STATUS</div>
        <div class="hud-row"><span class="hud-muted">UPLINK</span><span>SECURE</span></div>
        <div class="hud-row"><span class="hud-muted">DATALINK</span><span>ACTIVE</span></div>
        <div class="hud-row"><span class="hud-muted">CLOCK</span><span id="hudClock">--:--:--</span></div>
      </div>

      <div id="panelTargeting" class="hud-panel">
        <div class="hud-title">TARGETING</div>
        <div class="hud-row"><span class="hud-muted">TYPE</span><span id="hudType">---</span></div>
        <div class="hud-row"><span class="hud-muted">NAME</span><span id="hudName">---</span></div>
        <div class="hud-row"><span class="hud-muted">LON</span><span id="hudLon">---</span></div>
        <div class="hud-row"><span class="hud-muted">LAT</span><span id="hudLat">---</span></div>
        <div class="hud-row"><span class="hud-muted">ALT (m)</span><span id="hudAlt">---</span></div>
        <div class="hud-row"><span class="hud-muted">SPD</span><span id="hudSpeed">---</span></div>
      </div>

      <div id="panelInspect" class="hud-panel">
        <div class="hud-title">INSPECT</div>
        <div id="inspectBody">(click an asset)</div>
      </div>

      <div id="panelSensors" class="hud-panel">
        <div class="hud-title">SENSOR ARRAY</div>
        <div class="hud-row"><span class="hud-muted">MODE</span><span>STANDARD</span></div>
        <div class="hud-btns">
          <button class="hud-btn" type="button" data-mode="night">NIGHT VISION</button>
          <button class="hud-btn" type="button" data-mode="thermal">THERMAL (FLIR)</button>
          <button class="hud-btn active" type="button" data-mode="standard">STANDARD</button>
        </div>
      </div>
    </div>

    <script>
      // Minimal, token-free base layer using OpenStreetMap tiles.
      const viewer = new Cesium.Viewer("cesiumContainer", {
        baseLayerPicker: false,
        geocoder: false,
        homeButton: true,
        timeline: false,
        animation: false,
        sceneModePicker: false,
        navigationHelpButton: false,
        fullscreenButton: false,
        // We'll force the imagery layers right after init for reliability.
      });

      viewer.scene.globe.enableLighting = false;

      // --- Guaranteed visible base imagery (OSM) ---
      // 1) Remove any existing layers (including defaults)
      viewer.imageryLayers.removeAll(true);
      // 2) Add explicit OpenStreetMap imagery
      viewer.imageryLayers.addImageryProvider(
        new Cesium.OpenStreetMapImageryProvider({
          url: "https://tile.openstreetmap.org/",
        })
      );

      // --- CCTV sensor zone (placeholder material) ---
      // (We intentionally avoid a remote MP4 here to prevent CORS/black-texture issues.)
      const cctvFillMaterial = new Cesium.ColorMaterialProperty(
        new Cesium.CallbackProperty((time) => {
          const t = Cesium.JulianDate.toDate(time).getTime() / 1000.0;
          // Subtle pulse to suggest an active scan zone.
          const pulse = 0.5 + 0.5 * Math.sin(t * 2.0);
          const alpha = 0.16 + pulse * 0.06;
          return Cesium.Color.fromCssColorString("#003100").withAlpha(alpha);
        }, false)
      );
      const cctvOutlineColor = Cesium.Color.LIME.withAlpha(0.95);

      // Hunter St. & Bethune St. intersection (Peterborough, ON)
      // Enlarged bounds for easier verification from mid-altitude.
      const cctvRect = Cesium.Rectangle.fromDegrees(
        -78.3318,
        44.2965,
        -78.3118,
        44.3125
      );

      const cctvRectEntity = viewer.entities.add({
        id: "cctv:01:rect",
        name: "CCTV-01: HUNTER/BETHUNE LIVE",
        rectangle: {
          coordinates: cctvRect,
          material: cctvFillMaterial,
          outline: true,
          outlineColor: cctvOutlineColor,
        },
      });

      const cctvLon = -78.3218;
      const cctvLat = 44.3045;
      const cctvTopAltM = 220.0;

      cctvRectEntity.properties = new Cesium.PropertyBag({
        kind: "cctv",
        name: "CCTV-01: HUNTER/BETHUNE LIVE",
        centerLon: cctvLon,
        centerLat: cctvLat,
        status: "ACTIVE",
        west: Cesium.Math.toDegrees(cctvRect.west),
        east: Cesium.Math.toDegrees(cctvRect.east),
        south: Cesium.Math.toDegrees(cctvRect.south),
        north: Cesium.Math.toDegrees(cctvRect.north),
      });

      // Startup camera target for quick CCTV verification.
      viewer.camera.flyTo({
        destination: Cesium.Cartesian3.fromDegrees(cctvLon, cctvLat, 2500.0),
        orientation: {
          heading: Cesium.Math.toRadians(0.0),
          pitch: Cesium.Math.toRadians(-50.0),
          roll: 0.0,
        },
        duration: 1.4,
      });

      viewer.entities.add({
        id: "cctv:01:uplink",
        polyline: {
          positions: [
            Cesium.Cartesian3.fromDegrees(cctvLon, cctvLat, 0.0),
            Cesium.Cartesian3.fromDegrees(cctvLon, cctvLat, cctvTopAltM),
          ],
          width: 2,
          material: Cesium.Color.LIME.withAlpha(0.95),
          clampToGround: false,
        },
      });

      viewer.entities.add({
        id: "cctv:01:label",
        position: Cesium.Cartesian3.fromDegrees(cctvLon, cctvLat, cctvTopAltM),
        label: {
          text: "CCTV-01: HUNTER/BETHUNE LIVE",
          font: "14px monospace",
          fillColor: Cesium.Color.LIME,
          showBackground: true,
          backgroundColor: Cesium.Color.BLACK.withAlpha(0.35),
          pixelOffset: new Cesium.Cartesian2(0, -8),
          horizontalOrigin: Cesium.HorizontalOrigin.CENTER,
          verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
          disableDepthTestDistance: Number.POSITIVE_INFINITY,
        },
      });

      // --- HUD wiring ---
      const panelInspect = document.getElementById("panelInspect");
      const inspectBody = document.getElementById("inspectBody");

      function showInspect(text) {
        if (!panelInspect || !inspectBody) return;
        inspectBody.textContent = text;
        panelInspect.style.display = "block";
      }

      function hideInspect() {
        if (!panelInspect) return;
        panelInspect.style.display = "none";
      }

      function updateHudClock() {
        const el = document.getElementById("hudClock");
        if (!el) return;
        const now = new Date();
        el.textContent = now.toLocaleTimeString(undefined, {
          hour12: false,
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
        });
      }

      updateHudClock();
      setInterval(updateHudClock, 250);

      const hudLonEl = document.getElementById("hudLon");
      const hudLatEl = document.getElementById("hudLat");
      const hudTypeEl = document.getElementById("hudType");
      const hudNameEl = document.getElementById("hudName");
      const hudAltEl = document.getElementById("hudAlt");
      const hudSpeedEl = document.getElementById("hudSpeed");

      function getPropValue(valueOrProp) {
        if (valueOrProp && typeof valueOrProp.getValue === "function") return valueOrProp.getValue();
        return valueOrProp;
      }

      function getEntityKind(entity) {
        if (!entity || !entity.properties) return null;
        return getPropValue(entity.properties.kind);
      }

      function setTargetingUnlocked(lon, lat) {
        if (hudTypeEl) hudTypeEl.textContent = "---";
        if (hudNameEl) hudNameEl.textContent = "---";
        if (hudAltEl) hudAltEl.textContent = "---";
        if (hudSpeedEl) hudSpeedEl.textContent = "---";
        if (hudLonEl) hudLonEl.textContent = typeof lon === "number" ? lon.toFixed(5) : "---";
        if (hudLatEl) hudLatEl.textContent = typeof lat === "number" ? lat.toFixed(5) : "---";
      }

      function setTargetingLocked(entity) {
        const kind = getEntityKind(entity);
        const props = entity && entity.properties ? entity.properties : null;
        if (!props || (kind !== "satellite" && kind !== "aircraft")) return;

        const lon = getPropValue(props.lon);
        const lat = getPropValue(props.lat);
        const altM = getPropValue(props.alt_m);

        let name = "---";
        let speedMps = null;
        let type = "---";

        if (kind === "satellite") {
          type = "SATELLITE";
          name = getPropValue(props.name) || "---";
        } else {
          type = "AIRCRAFT";
          name = (getPropValue(props.callsign) || "").trim() || getPropValue(props.icao24) || "---";
          const v = getPropValue(props.speed_mps);
          speedMps = typeof v === "number" ? v : null;
        }

        if (hudTypeEl) hudTypeEl.textContent = type;
        if (hudNameEl) hudNameEl.textContent = String(name);
        if (hudLonEl) hudLonEl.textContent = typeof lon === "number" ? lon.toFixed(5) : "---";
        if (hudLatEl) hudLatEl.textContent = typeof lat === "number" ? lat.toFixed(5) : "---";
        if (hudAltEl) hudAltEl.textContent = typeof altM === "number" ? String(Math.round(altM)) : "---";
        if (hudSpeedEl) {
          hudSpeedEl.textContent = typeof speedMps === "number" ? `${speedMps.toFixed(1)} m/s` : "N/A";
        }
      }

      const LOCK_STYLES = {
        satellite: {
          base: { pixelSize: 8, outlineColor: Cesium.Color.WHITE, outlineWidth: 1 },
          locked: { pixelSize: 11, outlineColor: Cesium.Color.LIME.withAlpha(0.98), outlineWidth: 3 },
        },
        aircraft: {
          base: { pixelSize: 6, outlineColor: Cesium.Color.RED, outlineWidth: 1 },
          locked: { pixelSize: 9, outlineColor: Cesium.Color.LIME.withAlpha(0.98), outlineWidth: 3 },
        },
      };

      function applyLockVisual(entity, kind, locked) {
        if (!entity || !entity.point) return;
        const styles = LOCK_STYLES[kind];
        if (!styles) return;
        const s = locked ? styles.locked : styles.base;
        entity.point.pixelSize = s.pixelSize;
        entity.point.outlineColor = s.outlineColor;
        entity.point.outlineWidth = s.outlineWidth;
      }

      let lockedTarget = null;
      let lastMouseLonLat = { lon: null, lat: null };

      function clearLockedTarget() {
        if (lockedTarget && lockedTarget.entity) {
          applyLockVisual(lockedTarget.entity, lockedTarget.kind, false);
        }
        lockedTarget = null;
        setTargetingUnlocked(lastMouseLonLat.lon, lastMouseLonLat.lat);
      }

      function lockTargetToEntity(entity) {
        const kind = getEntityKind(entity);
        if (kind !== "satellite" && kind !== "aircraft") return;

        if (lockedTarget && lockedTarget.entity) {
          applyLockVisual(lockedTarget.entity, lockedTarget.kind, false);
        }

        let key = null;
        if (kind === "satellite") key = getPropValue(entity.properties.name);
        if (kind === "aircraft") key = getPropValue(entity.properties.icao24);

        lockedTarget = { kind, key, entity };
        applyLockVisual(entity, kind, true);
        setTargetingLocked(entity);
      }

      const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
      handler.setInputAction((movement) => {
        const cartesian = viewer.camera.pickEllipsoid(
          movement.endPosition,
          viewer.scene.globe.ellipsoid
        );
        if (!cartesian) {
          lastMouseLonLat = { lon: null, lat: null };
          if (!lockedTarget) setTargetingUnlocked(null, null);
          return;
        }

        const carto = Cesium.Cartographic.fromCartesian(cartesian);
        const lon = Cesium.Math.toDegrees(carto.longitude);
        const lat = Cesium.Math.toDegrees(carto.latitude);
        lastMouseLonLat = { lon, lat };
        if (!lockedTarget) setTargetingUnlocked(lon, lat);
      }, Cesium.ScreenSpaceEventType.MOUSE_MOVE);

      // Click-to-inspect behavior (satellites + CCTV zone)
      handler.setInputAction((click) => {
        const picked = viewer.scene.pick(click.position);
        if (!Cesium.defined(picked) || !picked.id) {
          // Clicking empty space clears the lock and returns TARGETING to mouse coords.
          const cartesian = viewer.camera.pickEllipsoid(
            click.position,
            viewer.scene.globe.ellipsoid
          );
          if (cartesian) {
            const carto = Cesium.Cartographic.fromCartesian(cartesian);
            lastMouseLonLat = {
              lon: Cesium.Math.toDegrees(carto.longitude),
              lat: Cesium.Math.toDegrees(carto.latitude),
            };
          }
          clearLockedTarget();
          hideInspect();
          return;
        }

        const entity = picked.id;
        const props = entity.properties;
        if (!props) {
          hideInspect();
          return;
        }

        const kind = getEntityKind(entity);
        if (kind === "satellite") {
          lockTargetToEntity(entity);
          const name = getPropValue(props.name);
          const lat = getPropValue(props.lat);
          const lon = getPropValue(props.lon);
          const alt = getPropValue(props.alt_m);
          if (
            typeof name === "string" &&
            typeof lat === "number" &&
            typeof lon === "number" &&
            typeof alt === "number"
          ) {
            showInspect(
              `SATELLITE\nNAME: ${name}\nLAT: ${lat.toFixed(5)}\nLON: ${lon.toFixed(5)}\nALT (m): ${Math.round(alt)}`
            );
          }
          return;
        }

        if (kind === "aircraft") {
          lockTargetToEntity(entity);
          hideInspect();
          return;
        }

        if (kind === "cctv") {
          const name = getPropValue(props.name);
          const centerLat = getPropValue(props.centerLat);
          const centerLon = getPropValue(props.centerLon);
          const status = getPropValue(props.status);
          if (
            typeof name === "string" &&
            typeof centerLat === "number" &&
            typeof centerLon === "number" &&
            typeof status === "string"
          ) {
            showInspect(
              `CCTV ZONE\nNAME: ${name}\nCENTER: ${centerLat.toFixed(5)}, ${centerLon.toFixed(5)}\nSTATUS: ${status}`
            );
          }
          // Don't disturb any existing lock if user clicks the CCTV zone.
          return;
        }

        hideInspect();
      }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

      // --- Live flight data (backend proxy) ---
      const flightEntitiesByIcao24 = new Map();

      function upsertFlightEntity(f) {
        const id = `flight:${f.icao24}`;
        const alt = typeof f.geo_alt_m === "number" ? f.geo_alt_m : typeof f.baro_alt_m === "number" ? f.baro_alt_m : 0;
        const position = Cesium.Cartesian3.fromDegrees(f.lon, f.lat, alt);
        const labelText = (f.callsign && f.callsign.trim().length > 0) ? f.callsign.trim() : f.icao24;

        let entity = flightEntitiesByIcao24.get(f.icao24);
        if (!entity) {
          entity = viewer.entities.add({
            id,
            position,
            point: {
              color: Cesium.Color.RED.withAlpha(0.95),
              pixelSize: 6,
              outlineColor: Cesium.Color.RED,
              outlineWidth: 1,
              disableDepthTestDistance: Number.POSITIVE_INFINITY,
            },
            label: {
              text: labelText,
              font: "14px monospace",
              fillColor: Cesium.Color.LIME,
              showBackground: true,
              backgroundColor: Cesium.Color.BLACK.withAlpha(0.35),
              pixelOffset: new Cesium.Cartesian2(10, -10),
              horizontalOrigin: Cesium.HorizontalOrigin.LEFT,
              verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
              disableDepthTestDistance: Number.POSITIVE_INFINITY,
            },
          });
          flightEntitiesByIcao24.set(f.icao24, entity);
        } else {
          entity.position = position;
          entity.label.text = labelText;
        }

        if (!entity.properties) {
          entity.properties = new Cesium.PropertyBag({
            kind: "aircraft",
            icao24: f.icao24,
            callsign: f.callsign || "",
            lat: f.lat,
            lon: f.lon,
            alt_m: alt,
            speed_mps: typeof f.velocity_mps === "number" ? f.velocity_mps : null,
          });
        } else {
          entity.properties.kind = "aircraft";
          entity.properties.icao24 = f.icao24;
          entity.properties.callsign = f.callsign || "";
          entity.properties.lat = f.lat;
          entity.properties.lon = f.lon;
          entity.properties.alt_m = alt;
          entity.properties.speed_mps = typeof f.velocity_mps === "number" ? f.velocity_mps : null;
        }

        if (
          lockedTarget &&
          lockedTarget.kind === "aircraft" &&
          lockedTarget.key === f.icao24 &&
          lockedTarget.entity === entity
        ) {
          setTargetingLocked(entity);
        }
      }

      function removeStaleFlights(liveIcao24Set) {
        for (const [icao24, entity] of flightEntitiesByIcao24.entries()) {
          if (!liveIcao24Set.has(icao24)) {
            if (
              lockedTarget &&
              lockedTarget.kind === "aircraft" &&
              lockedTarget.key === icao24
            ) {
              clearLockedTarget();
            }
            viewer.entities.remove(entity);
            flightEntitiesByIcao24.delete(icao24);
          }
        }
      }

      async function pollFlightsOnce() {
        const resp = await fetch("/api/flights", { cache: "no-store" });
        if (!resp.ok) return;
        const data = await resp.json();
        const flights = Array.isArray(data.flights) ? data.flights : [];

        const live = new Set();
        for (const f of flights) {
          if (!f || typeof f.icao24 !== "string") continue;
          if (typeof f.lon !== "number" || typeof f.lat !== "number") continue;
          live.add(f.icao24);
          upsertFlightEntity(f);
        }
        removeStaleFlights(live);
      }

      pollFlightsOnce();
      setInterval(pollFlightsOnce, 10_000);

      // --- Live satellite data (backend proxy) ---
      const satelliteEntitiesByName = new Map();

      function upsertSatelliteEntity(s) {
        const id = `sat:${s.name}`;
        const position = Cesium.Cartesian3.fromDegrees(s.lon, s.lat, s.alt);

        let entity = satelliteEntitiesByName.get(s.name);
        if (!entity) {
          entity = viewer.entities.add({
            id,
            position,
            point: {
              color: Cesium.Color.WHITE.withAlpha(0.98),
              pixelSize: 8,
              outlineColor: Cesium.Color.WHITE,
              outlineWidth: 1,
              disableDepthTestDistance: Number.POSITIVE_INFINITY,
            },
            label: {
              text: s.name,
              font: "13px monospace",
              fillColor: Cesium.Color.WHITE,
              showBackground: true,
              backgroundColor: Cesium.Color.BLACK.withAlpha(0.25),
              pixelOffset: new Cesium.Cartesian2(10, -10),
              horizontalOrigin: Cesium.HorizontalOrigin.LEFT,
              verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
              disableDepthTestDistance: Number.POSITIVE_INFINITY,
              // Reduce clutter: show satellite labels only when closer.
              distanceDisplayCondition: new Cesium.DistanceDisplayCondition(0.0, 800000.0),
            },
          });

          entity.properties = new Cesium.PropertyBag({
            kind: "satellite",
            name: s.name,
            lat: s.lat,
            lon: s.lon,
            alt_m: s.alt,
          });

          satelliteEntitiesByName.set(s.name, entity);
        } else {
          entity.position = position;
          entity.label.text = s.name;

          entity.properties.lat = s.lat;
          entity.properties.lon = s.lon;
          entity.properties.alt_m = s.alt;
        }

        if (
          lockedTarget &&
          lockedTarget.kind === "satellite" &&
          lockedTarget.key === s.name &&
          lockedTarget.entity === entity
        ) {
          setTargetingLocked(entity);
        }
      }

      function removeStaleSatellites(liveNameSet) {
        for (const [name, entity] of satelliteEntitiesByName.entries()) {
          if (!liveNameSet.has(name)) {
            if (
              lockedTarget &&
              lockedTarget.kind === "satellite" &&
              lockedTarget.key === name
            ) {
              clearLockedTarget();
            }
            viewer.entities.remove(entity);
            satelliteEntitiesByName.delete(name);
          }
        }
      }

      async function pollSatellitesOnce() {
        const resp = await fetch("/api/satellites", { cache: "no-store" });
        if (!resp.ok) return;
        const sats = await resp.json();
        if (!Array.isArray(sats)) return;

        const live = new Set();
        for (const s of sats) {
          if (!s || typeof s.name !== "string") continue;
          if (typeof s.lon !== "number" || typeof s.lat !== "number" || typeof s.alt !== "number") continue;
          live.add(s.name);
          upsertSatelliteEntity(s);
        }
        removeStaleSatellites(live);
      }

      pollSatellitesOnce();
      setInterval(pollSatellitesOnce, 15_000);

      // Military surveillance aesthetic: night vision phosphor + vignette + grain + CRT scanlines.
      const nightVisionCrtStage = new Cesium.PostProcessStage({
        name: "nightVisionCrt",
        fragmentShader: `
          uniform sampler2D colorTexture;
          uniform vec2 viewport;
          uniform float time;

          in vec2 v_textureCoordinates;

          float hash(vec2 p) {
            // Cheap 2D hash
            p = vec2(dot(p, vec2(127.1, 311.7)), dot(p, vec2(269.5, 183.3)));
            return fract(sin(p.x + p.y) * 43758.5453123);
          }

          void main() {
            vec2 uv = v_textureCoordinates;
            vec4 base = texture(colorTexture, uv);

            // Visibility boost so the scene doesn't crush to black.
            vec3 src = clamp(base.rgb * 2.3 + vec3(0.06), 0.0, 1.0);

            // Luminance from the base scene
            float lum = dot(src, vec3(0.299, 0.587, 0.114));

            // High-contrast mapping into phosphor green
            lum = pow(clamp(lum, 0.0, 1.0), 0.45);
            vec3 phosphor = vec3(0.1, 0.95, 0.2);
            vec3 col = phosphor * lum * 1.40;

            // Vignette (camera lens falloff)
            vec2 c = uv - 0.5;
            float r = length(c);
            float vignette = smoothstep(0.85, 0.35, r);
            col *= vignette;

            // Subtle animated film grain
            float n = hash(uv * viewport + time * 60.0);
            float grain = (n - 0.5) * 0.08;
            col += grain;

            // Horizontal CRT scanlines drifting down
            float scanFreq = 900.0;          // lines per screen height
            float drift = time * 0.08;       // slow vertical drift
            float scan = sin((uv.y + drift) * scanFreq * 6.2831853);
            float scanlines = 0.92 + 0.08 * scan;
            col *= scanlines;

            // Exposure boost
            col *= 1.20;

            // Slight bloom-ish clamp for crisp phosphor
            col = clamp(col, 0.0, 1.0);
            out_FragColor = vec4(col, 1.0);
          }
        `,
        uniforms: {
          viewport: () => new Cesium.Cartesian2(viewer.canvas.clientWidth, viewer.canvas.clientHeight),
          time: () => performance.now() / 1000.0,
        },
      });

      // Thermal (FLIR) stage
      const thermalFlirStage = new Cesium.PostProcessStage({
        name: "thermalFlir",
        fragmentShader: `
          uniform sampler2D colorTexture;

          in vec2 v_textureCoordinates;

          vec3 thermalRamp(float t) {
            // Cold -> hot: purple/blue -> red/orange -> yellow/white
            vec3 cold = vec3(0.10, 0.00, 0.20);
            vec3 mid1 = vec3(0.10, 0.10, 0.65);
            vec3 mid2 = vec3(0.85, 0.12, 0.05);
            vec3 hot = vec3(1.00, 0.95, 0.80);

            float a = smoothstep(0.00, 0.40, t);
            float b = smoothstep(0.35, 0.75, t);
            float c = smoothstep(0.70, 1.00, t);

            vec3 col = mix(cold, mid1, a);
            col = mix(col, mid2, b);
            col = mix(col, hot, c);
            return col;
          }

          void main() {
            vec4 base = texture(colorTexture, v_textureCoordinates);

            // Visibility boost so the scene doesn't crush to black.
            vec3 src = clamp(base.rgb * 2.2 + vec3(0.06), 0.0, 1.0);

            float lum = dot(src, vec3(0.299, 0.587, 0.114));
            lum = pow(clamp(lum, 0.0, 1.0), 0.65);

            vec3 col = thermalRamp(lum);

            // Slight glow/bloom for hottest areas (simple intensity boost)
            float hot = smoothstep(0.80, 1.00, lum);
            col += hot * vec3(0.35, 0.35, 0.28);
            col *= 1.20;
            col = clamp(col, 0.0, 1.0);
            out_FragColor = vec4(col, 1.0);
          }
        `,
      });

      viewer.scene.postProcessStages.add(nightVisionCrtStage);
      viewer.scene.postProcessStages.add(thermalFlirStage);
      // Default mode is STANDARD (no post-processing).
      nightVisionCrtStage.enabled = false;
      thermalFlirStage.enabled = false;

      // Sensor mode toggles
      const sensorButtons = Array.from(document.querySelectorAll("#panelSensors .hud-btn"));

      function setSensorMode(mode) {
        if (mode === "night") {
          nightVisionCrtStage.enabled = true;
          thermalFlirStage.enabled = false;
        } else if (mode === "thermal") {
          nightVisionCrtStage.enabled = false;
          thermalFlirStage.enabled = true;
        } else {
          // STANDARD
          nightVisionCrtStage.enabled = false;
          thermalFlirStage.enabled = false;
        }

        for (const btn of sensorButtons) {
          const isActive = btn.getAttribute("data-mode") === mode;
          btn.classList.toggle("active", isActive);
        }
      }

      for (const btn of sensorButtons) {
        btn.addEventListener("click", () => {
          const mode = btn.getAttribute("data-mode") || "standard";
          setSensorMode(mode);
        });
      }

      // Default to STANDARD for visibility.
      setSensorMode("standard");
    </script>
  </body>
</html>
